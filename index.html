<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PERKABEM Scanner</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#B5121B;
  color:white;
  text-align:center;
}

.app{
  padding:24px;
}

h1{
  margin-top:20px;
}

#reader{
  margin:25px auto;
  width:100%;
  max-width:420px;
  background:white;
  border-radius:18px;
  overflow:hidden;
}

.status{
  margin-top:18px;
  font-size:16px;
}

button{
  padding:14px 22px;
  border:0;
  border-radius:12px;
  background:#D4AF37;
  color:#111;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <h1>PERKABEM</h1>
  <p>Event Check-In Scanner</p>

  <div id="reader"></div>

  <div class="status" id="status">
    Arahkan kamera ke QR undangan
  </div>

  <br>

  <button onclick="restartScanner()">Scan Lagi</button>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="scanner.js"></script>

</body>
</html>
